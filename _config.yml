# ╔══════════════════════════════════════════════════════╗
# ║                  FRONT MATTER                        ║
# ╚══════════════════════════════════════════════════════╝

defaults:
  - scope:
      path: "pages"
    values:
      layout: "default"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

# ╔══════════════════════════════════════════════════════╗
# ║                  ОСНОВНАЯ ИНФОРМАЦИЯ                 ║
# ╚══════════════════════════════════════════════════════╝

# Название сайта. Используется в <title> страницы и в шапке.
title: "LinuxGik"

# Краткое описание сайта. Используется в мета-теге description.
#description: "Описание сайта"

# Полный URL сайта БЕЗ слеша в конце.
# Важно для sitemap и для корректных абсолютных ссылок.
url: "https://linuxgik.ru"

# Язык сайта. Попадает в атрибут lang тега <html>.
# Важно для SEO и для скринридеров.
lang: ru


  # ╔══════════════════════════════════════════════════════╗
  # ║                      ПАГИНАЦИЯ                       ║
  # ╚══════════════════════════════════════════════════════╝

  # Сколько постов показывать на одной странице.
  # Если пагинация не нужна — удали эти две строки.
  #paginate: 5

  # По какому пути будут страницы пагинации.
  # /page/2, /page/3 и т.д.
  #paginate_path: "/page/:num"


  # ╔══════════════════════════════════════════════════════╗
  # ║                      ПЛАГИНЫ                         ║
  # ╚══════════════════════════════════════════════════════╝

  # Список активных плагинов.
  # Каждый плагин также должен быть прописан в Gemfile.
  #plugins:
# Автоматически генерирует sitemap.xml — карту сайта для поисковиков.
#  - jekyll-sitemap


# ╔══════════════════════════════════════════════════════╗
# ║                    СБОРКА                            ║
# ╚══════════════════════════════════════════════════════╝

# Файлы и папки которые Jekyll не включает в сборку.
# Итоговый сайт в папке _site будет без них.
exclude:
  # Gemfile и его lock-файл — это только для локальной разработки.
  - Gemfile
  - Gemfile.lock
  # Папка vendor появляется если устанавливать гемы локально через bundle.
  - vendor/
